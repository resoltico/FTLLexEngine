# Mypy configuration for examples/
#
# This configuration provides strict type checking for example code.
#
# Philosophy:
# - Examples should demonstrate best practices
# - Strict mode enabled to catch real bugs
#
# Usage:
#   cd examples && mypy .
#   OR from project root: mypy examples/

[mypy]
# Use strict type checking for examples (demonstrate best practices)
strict = True

# Python version
python_version = 3.13

# Strict type checking settings (applied globally)
disallow_untyped_defs = True
warn_return_any = True
warn_redundant_casts = True
warn_unused_ignores = True
strict_equality = True
