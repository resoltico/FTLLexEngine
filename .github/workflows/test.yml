name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # Force all uv commands (sync, run, etc.) to use the same versioned venv as the
    # scripts. Without this, bare "uv sync" creates the default ".venv" while the
    # scripts pivot to ".venv-<version>", wasting ~150 MiB on a duplicate environment.
    env:
      UV_PROJECT_ENVIRONMENT: .venv-${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        # 3.13 is the minimum supported version (requires-python = ">=3.13").
        # 3.14 validates forward compatibility.
        # When Python 3.15 releases (~late 2026), add "3.15" here.
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Make scripts executable
        run: chmod +x ./scripts/lint.sh ./scripts/test.sh

      - name: Detect package name
        id: detect
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(find src -mindepth 1 -maxdepth 1 -type d -not -name "*.egg-info" -not -name "__pycache__" | head -n 1 | xargs basename)
          if [ -z "$PACKAGE_NAME" ]; then
            echo "::error::Could not detect package in src/"
            exit 1
          fi
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Detected package: $PACKAGE_NAME"

      - name: Install dependencies
        run: |
          uv sync --all-groups --locked
          echo "Locked environment synchronized"

      - name: Run Linters
        run: |
          echo "::group::Linting (target: Python ${{ matrix.python-version }})"
          PY_VERSION=${{ matrix.python-version }} uv run scripts/lint.sh
          echo "::endgroup::"

      - name: Run Tests
        run: |
          echo "::group::Testing"
          uv run scripts/test.sh --ci
          echo "::endgroup::"

      - name: Verify package import
        run: |
          PACKAGE="${{ steps.detect.outputs.name }}"
          uv run python -c "import ${PACKAGE}; print(f'Successfully imported ${PACKAGE} v{${PACKAGE}.__version__}')"
